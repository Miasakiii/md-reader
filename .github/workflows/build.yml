name: Build MD Reader

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            bundles: nsis
          - platform: macos-latest
            target: aarch64-apple-darwin
            bundles: dmg,app
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            bundles: deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Build Tauri bundles
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Package Windows portable assets
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.version }}"
          $releaseDir = "release/v$version"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $portableExe = "$releaseDir/MD-Reader-$version-portable.exe"
          Copy-Item "src-tauri/target/release/md-reader.exe" $portableExe

          @"
          MD Reader v$version 便携版使用说明
          ================================

          1. 解压后将 MD-Reader-$version-portable.exe 放到任意文件夹
          2. 双击运行，无需安装
          3. 可将 .md 文件拖入窗口打开
          4. 阅读进度与窗口大小会自动保存

          系统要求：Windows 10/11（需 WebView2 运行时）
          "@ | Set-Content -Path "$releaseDir/使用说明.txt" -Encoding UTF8

          Compress-Archive -Path $portableExe, "$releaseDir/使用说明.txt" -DestinationPath "$releaseDir/MD-Reader-$version-portable.zip" -Force

          $setup = Get-ChildItem "src-tauri/target/release/bundle/nsis/*-setup.exe" | Select-Object -First 1
          Copy-Item $setup.FullName "$releaseDir/MD-Reader-$version-setup.exe"

      - name: Upload Windows release folder
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-v${{ steps.version.outputs.version }}
          path: release/v${{ steps.version.outputs.version }}/

      - name: Upload macOS/Linux bundles
        if: matrix.platform != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-bundles
          path: src-tauri/target/release/bundle/

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Download Windows assets
        uses: actions/download-artifact@v4
        with:
          name: windows-release-v${{ steps.version.outputs.version }}
          path: assets/windows

      - name: Download macOS bundles
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-bundles
          path: assets/macos
        continue-on-error: true

      - name: Download Linux bundles
        uses: actions/download-artifact@v4
        with:
          name: ubuntu-22.04-bundles
          path: assets/linux
        continue-on-error: true

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MD Reader v${{ steps.version.outputs.version }}
          body_path: release-notes-v${{ steps.version.outputs.version }}.md
          draft: true
          files: |
            assets/windows/*
            assets/macos/**/*
            assets/linux/**/*
          fail_on_unmatched_files: false
